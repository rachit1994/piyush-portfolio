name: Performance & Memory

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Resolve bundled Chromium
        run: |
          CHROME_PATH=$(node -e "require('puppeteer').executablePath().then((p) => process.stdout.write(p))")
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Memory budget
        run: npm run perf:memory

      - name: Lighthouse performance budget
        run: npm run perf:lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
